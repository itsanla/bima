version: '3.8'

services:
  bima-api:
    build: .
    container_name: bima-backend-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_DIR=/app/data
    volumes:
      # Gunakan Named Volumes agar Coolify menyimpannya secara permanen dan aman
      - bima_data:/app/data
      - bima_storage:/app/storage
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      # Routing untuk API
      - "traefik.http.routers.bima-api-custom.rule=Host(`bima-version.steamlog.cloud`)"
      - "traefik.http.routers.bima-api-custom.entrypoints=https"
      - "traefik.http.routers.bima-api-custom.tls=true"
      - "traefik.http.services.bima-api-custom.loadbalancer.server.port=3100"

networks:
  coolify:
    external: true

volumes:
  bima_data:
    name: bima_api_data
  bima_storage:
    name: bima_api_storage
