version: '3.8'

services:
  backend-mobile-version:
    build: .
    container_name: backend-mobile-version
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_DIR=/app/data
    volumes:
      # Gunakan Named Volumes agar Coolify menyimpannya secara permanen dan aman
      - bima_data:/app/data
      - bima_storage:/app/storage
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # Routing untuk API
      - "traefik.http.routers.backend-mobile-version.rule=Host(`bima-version.steamlog.cloud`)"
      - "traefik.http.routers.backend-mobile-version.entrypoints=https"
      - "traefik.http.routers.backend-mobile-version.tls=true"
      - "traefik.http.routers.backend-mobile-version.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend-mobile-version.loadbalancer.server.port=3100"

networks:
  coolify:
    external: true

volumes:
  bima_data:
    name: bima_api_data
  bima_storage:
    name: bima_api_storage
